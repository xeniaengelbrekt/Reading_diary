<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Книги">

<title>Читательский дневник</title>
<script>
// ── PWA: inline Service Worker for offline use ──────────────
if('serviceWorker' in navigator){
  const sw=`
const CACHE='reading-diary-v1';
const FILES=['./'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES))));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;}).catch(()=>caches.match('./')))));
`;
  const blob=new Blob([sw],{type:'text/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
// ── PWA: inline Manifest ─────────────────────────────────────
const manifest={name:'Читательский дневник',short_name:'Книги',start_url:'.',display:'standalone',background_color:'#070d08',theme_color:'#070d08',orientation:'portrait',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="%23070d08"/><text y="130" x="96" font-size="110" text-anchor="middle">📚</text></svg>',sizes:'192x192',type:'image/svg+xml'},{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="100" fill="%23070d08"/><text y="360" x="256" font-size="300" text-anchor="middle">📚</text></svg>',sizes:'512x512',type:'image/svg+xml'}]};
const mblob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
const murl=URL.createObjectURL(mblob);
const mlink=document.createElement('link');mlink.rel='manifest';mlink.href=murl;document.head.appendChild(mlink);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);}

/* ════ THEMES ════ */
.t0{ /* лес */
  --bg:#070d08;--bg2:#0e1a0f;--bg3:#142018;
  --acr:80,198,110;--ac:rgb(80,198,110);--acl:#6ddf94;
  --gold:#d4bc62;--text:#eaf5ea;--sub:#8ec49a;--dim:#4a7a54;
  --card:rgba(255,255,255,.07);--brd:rgba(80,198,110,.15);
  --nav:rgba(7,13,8,.96);
}
.t1{ /* море */
  --bg:#050e18;--bg2:#0a1a2c;--bg3:#0e2238;
  --acr:56,188,238;--ac:rgb(56,188,238);--acl:#7ed8f8;
  --gold:#7edbff;--text:#daf2ff;--sub:#72b8d8;--dim:#3a6888;
  --card:rgba(255,255,255,.07);--brd:rgba(56,188,238,.15);
  --nav:rgba(5,14,24,.96);
}
.t2{ /* космос */
  --bg:#06040e;--bg2:#100c20;--bg3:#180e2e;
  --acr:162,112,240;--ac:rgb(162,112,240);--acl:#c898ff;
  --gold:#e8d0ff;--text:#f2e8ff;--sub:#b498d8;--dim:#6a48a8;
  --card:rgba(255,255,255,.07);--brd:rgba(162,112,240,.15);
  --nav:rgba(6,4,14,.96);
}

html,body{height:100%;overflow:hidden;background:#000;}
#app{
  max-width:430px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  position:relative;overflow:hidden;
}

/* stars (cosmos only) */
.star{position:absolute;border-radius:50%;background:#fff;pointer-events:none;animation:twinkle var(--tw,3s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:var(--oa,.4)}50%{opacity:var(--ob,.9)}}
#stars-bg{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .8s;}
.t2 #stars-bg{opacity:1;}

/* ════ HEADER ════ */
#hdr{
  padding:calc(var(--safe-t) + 14px) 20px 0;
  flex-shrink:0;
  background:linear-gradient(to bottom,var(--bg2) 0%,transparent 100%);
  position:relative;z-index:10;
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.app-meta{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dim);font-weight:700;}
.app-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text);margin-top:3px;}
.theme-btn{
  background:var(--card);border:1px solid var(--brd);
  border-radius:20px;padding:6px 13px;
  color:var(--sub);font-size:11px;font-weight:700;
  display:flex;align-items:center;gap:5px;
  transition:all .2s;margin-top:2px;
  font-family:'DM Sans',sans-serif;
}

/* ════ MAIN TABS ════ */
.mtabs{display:flex;gap:5px;padding-bottom:14px;}
.mtab{
  flex:1;padding:7px 2px;
  background:transparent;border:1.5px solid var(--brd);
  border-radius:10px;color:var(--dim);
  font-size:10px;font-weight:700;
  transition:all .2s;
  font-family:'DM Sans',sans-serif;
}
.mtab.on{background:rgba(var(--acr),.18);border-color:var(--ac);color:var(--ac);}

/* ════ CONTENT ════ */
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;z-index:1;}
.pane{display:none;padding:12px 20px 90px;}
.pane.on{display:block;}

/* ════ FAB ════ */
#fab{
  position:absolute;bottom:calc(18px + var(--safe-b));right:20px;
  width:56px;height:56px;
  background:var(--ac);border:none;border-radius:18px;
  color:var(--bg);font-size:28px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(0,0,0,.55);
  z-index:50;transition:transform .15s,background .5s;line-height:1;
}
#fab:active{transform:scale(.91);}

/* ════ MODAL ════ */
#modal{position:absolute;inset:0;z-index:200;display:none;}
#modal.open{display:flex;flex-direction:column;justify-content:flex-end;}
.mo-overlay{position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);}
.mo-sheet{
  position:relative;z-index:1;
  background:var(--bg3);
  border-radius:24px 24px 0 0;
  border-top:1px solid var(--brd);
  padding:20px 20px calc(20px + var(--safe-b));
  max-height:92vh;overflow-y:auto;
}
.mo-handle{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:0 auto 18px;}
.mo-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--text);margin-bottom:18px;}

/* ════ FORM ════ */
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:7px;}
.field input,.field select{
  width:100%;background:var(--card);
  border:1.5px solid var(--brd);border-radius:11px;
  padding:13px 15px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  transition:border-color .2s;
  -webkit-appearance:none;appearance:none;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--ac);}
.field input::placeholder{color:var(--dim);}
.field select option{background:#0e0e1e;color:#fff;}

/* Month picker */
.mpicker{background:var(--card);border:1.5px solid var(--brd);border-radius:13px;overflow:hidden;}
.mpicker-yr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--brd);}
.mpicker-yr-btn{background:transparent;border:none;color:var(--sub);font-size:20px;padding:2px 10px;line-height:1;transition:color .15s;}
.mpicker-yr-btn:active{color:var(--ac);}
.mpicker-yr-lbl{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);}
.mpicker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--brd);}
.mpicker-mo{padding:11px 4px;background:var(--bg3);color:var(--sub);font-size:12px;font-weight:700;text-align:center;transition:all .15s;border:none;font-family:'DM Sans',sans-serif;}
.mpicker-mo:active{background:rgba(var(--acr),.15);}
.mpicker-mo.on{background:rgba(var(--acr),.22);color:var(--ac);}
.mpicker-none{display:block;width:100%;padding:10px;background:transparent;border:none;border-top:1px solid var(--brd);color:var(--dim);font-size:11px;font-weight:600;text-align:center;font-family:'DM Sans',sans-serif;transition:color .15s;}
.mpicker-none.on{color:var(--ac);}
.mpicker-none:active{color:var(--ac);}
.rgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.ropt{
  padding:9px 4px;background:var(--card);
  border:1.5px solid var(--brd);border-radius:9px;
  color:var(--sub);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;text-align:center;
  transition:all .15s;
}
.ropt.on{background:rgba(var(--acr),.22);border-color:var(--ac);color:var(--ac);}

/* Buttons */
.btn-row{display:flex;gap:8px;margin-top:18px;}
.btn-save{
  flex:1;padding:14px;background:var(--ac);
  border:none;border-radius:12px;color:var(--bg);
  font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
  transition:opacity .2s;
}
.btn-save:active{opacity:.8;}
.btn-cancel{
  padding:14px 18px;background:var(--card);
  border:1.5px solid var(--brd);border-radius:12px;
  color:var(--sub);font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;
}
.btn-del{
  padding:14px 16px;
  background:rgba(220,60,60,.1);border:1.5px solid rgba(220,60,60,.22);
  border-radius:12px;color:#e07878;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
}

/* ════ COMPONENTS ════ */

/* Stat cards */
.srow{display:flex;gap:8px;margin-bottom:16px;}
.stat{flex:1;padding:12px 6px;background:var(--card);border:1px solid var(--brd);border-radius:13px;text-align:center;}
.sv{font-family:'Playfair Display',serif;font-size:25px;font-weight:700;color:var(--text);line-height:1;}
.sv.g{color:var(--gold);}
.sl{font-size:10px;font-weight:600;color:var(--sub);margin-top:5px;line-height:1.3;}

/* Section header */
.sh{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.shl{flex:1;height:1px;background:var(--brd);}

/* Book card */
.bcard{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;background:var(--card);
  border:1px solid var(--brd);border-radius:13px;
  margin-bottom:6px;cursor:pointer;
  transition:background .12s;
}
.bcard:active{background:rgba(var(--acr),.12);}
.bnk{min-width:18px;font-family:'Playfair Display',serif;font-size:14px;color:var(--dim);font-weight:700;flex-shrink:0;}
.bi{flex:1;min-width:0;}
.bt{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;}
.ba{font-size:11px;font-weight:500;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bsc{min-width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:12px;font-weight:700;flex-shrink:0;}

/* Month pills */
.mpills{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;}
.mpill{
  padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--brd);background:transparent;
  color:var(--dim);font-size:11px;font-weight:700;
  transition:all .18s;font-family:'DM Sans',sans-serif;
}
.mpill.on{background:rgba(var(--acr),.18);border-color:var(--ac);color:var(--ac);}

/* Best book */
.best{background:rgba(var(--acr),.08);border:1.5px solid rgba(var(--acr),.2);border-radius:14px;padding:13px 15px;margin-bottom:14px;}
.best-tag{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:5px;}
.best-title{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:3px;}
.best-auth{font-size:11px;font-weight:500;color:var(--sub);}

/* Bar chart */
.barr{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.barm{width:70px;font-size:11px;font-weight:600;color:var(--sub);flex-shrink:0;}
.barw{flex:1;height:26px;background:rgba(255,255,255,.05);border-radius:6px;position:relative;overflow:hidden;}
.barf{position:absolute;inset:0 auto 0 0;border-radius:6px;background:linear-gradient(90deg,rgba(var(--acr),.55),rgba(var(--acr),.18));}
.barn{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:var(--ac);}
.bara{width:32px;font-size:11px;font-weight:700;color:var(--gold);text-align:right;flex-shrink:0;}

/* Dist bars */
.drow{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.drv{width:32px;font-size:11px;font-weight:700;color:var(--sub);text-align:right;flex-shrink:0;}
.drb{flex:1;height:13px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;}
.drf{height:100%;border-radius:4px;}
.drc{width:22px;font-size:11px;font-weight:600;color:var(--sub);flex-shrink:0;}

/* Author row */
.ar{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:var(--card);border:1px solid var(--brd);border-radius:13px;margin-bottom:6px;}
.an{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:10px;}
.am{display:flex;gap:7px;align-items:center;flex-shrink:0;}
.ab{background:rgba(var(--acr),.16);border:1px solid rgba(var(--acr),.28);border-radius:10px;padding:3px 9px;font-size:10px;font-weight:700;color:var(--ac);}
.aa{font-family:'Playfair Display',serif;font-weight:700;font-size:14px;color:var(--gold);}

/* Sub-tabs */
.stabs{display:flex;gap:5px;margin-bottom:14px;}
.stab{flex:1;padding:8px 4px;background:transparent;border:1.5px solid var(--brd);border-radius:9px;color:var(--dim);font-size:10px;font-weight:700;transition:all .18s;font-family:'DM Sans',sans-serif;}
.stab.on{background:rgba(var(--acr),.18);border-color:var(--ac);color:var(--ac);}

/* Year watermark */
.ywm{font-family:'Playfair Display',serif;font-size:64px;font-weight:700;letter-spacing:-5px;color:rgba(var(--acr),.08);text-align:center;line-height:1;margin-bottom:10px;pointer-events:none;}

/* Search */
.srch-wrap{position:relative;margin-bottom:14px;}
.srch{width:100%;background:var(--card);border:1.5px solid var(--brd);border-radius:12px;padding:12px 14px 12px 40px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;}
.srch:focus{outline:none;border-color:var(--ac);}
.srch::placeholder{color:var(--dim);}
.srch-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:16px;pointer-events:none;}

/* Sort */
.sort-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.sort-row::-webkit-scrollbar{display:none;}
.srt{padding:5px 13px;border-radius:16px;border:1.5px solid var(--brd);background:transparent;color:var(--dim);font-size:10.5px;font-weight:700;white-space:nowrap;transition:all .18s;font-family:'DM Sans',sans-serif;}
.srt.on{background:rgba(var(--acr),.18);border-color:var(--ac);color:var(--ac);}

/* Export/Import */
.toolbar{display:flex;gap:8px;margin-bottom:16px;}
.tbr-btn{flex:1;padding:9px 6px;background:var(--card);border:1px solid var(--brd);border-radius:10px;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;transition:background .15s;}
.tbr-btn:active{background:rgba(var(--acr),.12);}

/* Top-10 count */
.tcnt{font-size:11px;color:var(--sub);text-align:center;margin-bottom:12px;font-style:italic;font-weight:500;}

/* Empty */
.empty{text-align:center;padding:60px 20px 20px;}
.eico{font-size:42px;opacity:.28;margin-bottom:14px;}
.etxt{font-family:'Playfair Display',serif;font-style:italic;font-size:16px;color:var(--dim);}
.esub{font-size:12px;color:var(--dim);margin-top:7px;font-weight:500;opacity:.6;}

/* Divider */
.hdiv{height:1px;background:rgba(255,255,255,.06);margin:0 0 16px;}

::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:rgba(var(--acr),.25);border-radius:2px;}
</style>
</head>
<body>
<div id="app" class="t0">

  <!-- Stars (cosmos theme) -->
  <div id="stars-bg"></div>

  <!-- Header -->
  <div id="hdr">
    <div class="hdr-top">
      <div>
        <div class="app-meta">читательский дневник</div>
        <div class="app-title">мои книги</div>
      </div>
      <button class="theme-btn" id="tbtn" onclick="cycleTheme()">🌲 <span id="tname">лес</span></button>
    </div>
    <div class="mtabs" id="mtabs">
      <button class="mtab on" onclick="switchTab(0)">месяц</button>
      <button class="mtab" onclick="switchTab(1)">год</button>
      <button class="mtab" onclick="switchTab(2)">опыт</button>
      <button class="mtab" onclick="switchTab(3)">книги</button>
    </div>
  </div>

  <!-- Panes -->
  <div id="content">
    <div class="pane on" id="p0"></div>
    <div class="pane" id="p1"></div>
    <div class="pane" id="p2"></div>
    <div class="pane" id="p3"></div>
  </div>

  <!-- FAB -->
  <button id="fab" onclick="openAdd()">+</button>

  <!-- Modal -->
  <div id="modal">
    <div class="mo-overlay" onclick="closeModal()"></div>
    <div class="mo-sheet">
      <div class="mo-handle"></div>
      <div class="mo-title" id="mo-title">Новая книга</div>
      <div class="field">
        <label>Название</label>
        <input id="f-title" type="text" placeholder="Название книги...">
      </div>
      <div class="field">
        <label>Автор</label>
        <input id="f-author" type="text" placeholder="Имя автора...">
      </div>
      <div class="field">
        <label>Оценка</label>
        <div class="rgrid" id="rgrid"></div>
      </div>
      <div class="field">
        <label>Месяц прочтения</label>
        <div class="mpicker" id="mpicker">
          <div class="mpicker-yr">
            <button class="mpicker-yr-btn" onclick="pickerYr(-1)">‹</button>
            <span class="mpicker-yr-lbl" id="picker-yr-lbl">2026</span>
            <button class="mpicker-yr-btn" onclick="pickerYr(+1)">›</button>
          </div>
          <div class="mpicker-grid" id="picker-grid"></div>
          <button class="mpicker-none" id="picker-none" onclick="pickerNone()">— без даты —</button>
        </div>
      </div>
      <div class="btn-row" id="btn-row"></div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const THEMES=[{n:'лес',i:'🌲',c:'t0'},{n:'море',i:'🌊',c:'t1'},{n:'космос',i:'🌌',c:'t2'}];
const MO=["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
const RATINGS=[3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10];

let books=[],curTab=0,curMonth=null,curExp=0,curSort=0,searchQ='',curTheme=0;
let editId=null,draftRating=8,draftMonth='';

function persist(){localStorage.setItem('rdiary',JSON.stringify(books));localStorage.setItem('rdiary_th',curTheme);}
function hydrate(){
  try{books=JSON.parse(localStorage.getItem('rdiary')||'[]');}catch(e){books=[];}
  curTheme=parseInt(localStorage.getItem('rdiary_th')||'0');
}

function uid(){return Date.now()+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function avg(a){return a.length?(a.reduce((s,v)=>s+v,0)/a.length).toFixed(1):'—';}

// ══════════════════════════════════════════════════════
// SCORE BADGE
// ══════════════════════════════════════════════════════
function badge(r){
  const hi=r>=9.5,med=r>=7.5;
  const s=hi
    ?`background:rgba(var(--acr),.22);border:1px solid rgba(var(--acr),.42);color:var(--gold)`
    :med
    ?`background:rgba(var(--acr),.12);border:1px solid rgba(var(--acr),.28);color:var(--ac)`
    :`background:rgba(255,255,255,.05);border:1px solid var(--brd);color:var(--sub)`;
  return `<div class="bsc" style="${s}">${r}</div>`;
}

function bcard(b,rank,onclick){
  const rk=rank!==undefined?`<span class="bnk">${rank}</span>`:'';
  const cb=onclick||`openEdit('${b.id}')`;
  return `<div class="bcard" onclick="${cb}">${rk}<div class="bi"><div class="bt" title="${esc(b.title)}">${esc(b.title)}</div><div class="ba">${esc(b.author)}</div></div>${badge(b.rating)}</div>`;
}
function sh(t){return `<div class="sh"><div class="shl"></div>${t}<div class="shl"></div></div>`;}
function srow(items){return `<div class="srow">${items.map(i=>`<div class="stat"><div class="sv${i.g?' g':''}">${i.v}</div><div class="sl">${i.l}</div></div>`).join('')}</div>`;}
function empty(txt,sub){return `<div class="empty"><div class="eico">📚</div><div class="etxt">${txt||'Здесь пока пусто'}</div>${sub?`<div class="esub">${sub}</div>`:''}</div>`;}

// ══════════════════════════════════════════════════════
// RENDER — MONTHLY
// ══════════════════════════════════════════════════════
function renderMonthly(){
  const p=document.getElementById('p0');
  const months=[...new Set(books.filter(b=>b.month).map(b=>b.month))].sort();
  if(!months.length){p.innerHTML=empty('Нет книг с датой','Добавь книгу и укажи месяц прочтения');return;}
  if(!curMonth||!months.includes(curMonth))curMonth=months[months.length-1];

  const pills=months.map(m=>{
    const[,mo]=m.split('-');
    return `<button class="mpill${m===curMonth?' on':''}" onclick="selMonth('${m}')">${MO[parseInt(mo)-1]}</button>`;
  }).join('');

  const mb=books.filter(b=>b.month===curMonth).sort((a,b)=>b.rating-a.rating);
  const best=mb[0];
  const bc=best?`<div class="best"><div class="best-tag">✦ книга месяца</div><div class="best-title">${esc(best.title)}</div><div class="best-auth">${esc(best.author)}</div></div>`:'';

  p.innerHTML=`
    <div class="mpills">${pills}</div>
    ${srow([{v:mb.length,l:'прочитано'},{v:avg(mb.map(b=>b.rating)),l:'средняя оценка',g:true},{v:best?best.rating:'—',l:'лучшая оценка',g:true}])}
    ${bc}
    ${sh('все книги')}
    ${mb.map(b=>bcard(b)).join('')}
  `;
}
function selMonth(m){curMonth=m;renderMonthly();}

// ══════════════════════════════════════════════════════
// RENDER — YEARLY
// ══════════════════════════════════════════════════════
function renderYearly(){
  const p=document.getElementById('p1');
  const yrs=[...new Set(books.filter(b=>b.month).map(b=>b.month.split('-')[0]))].sort();
  if(!yrs.length){p.innerHTML=empty('Нет книг с датой');return;}
  const yr=yrs[yrs.length-1];
  const yb=books.filter(b=>b.month&&b.month.startsWith(yr));
  const months=[...new Set(yb.map(b=>b.month))].sort();
  const maxC=Math.max(...months.map(m=>books.filter(b=>b.month===m).length),1);

  const bars=months.map(m=>{
    const mb=books.filter(b=>b.month===m);
    const[,mo]=m.split('-');
    return `<div class="barr"><span class="barm">${MO[parseInt(mo)-1]}</span><div class="barw"><div class="barf" style="width:${(mb.length/maxC*100).toFixed(1)}%"></div><span class="barn">${mb.length}</span></div><span class="bara">${avg(mb.map(b=>b.rating))}</span></div>`;
  }).join('');

  const top3=[...yb].sort((a,b)=>b.rating-a.rating).slice(0,3);
  p.innerHTML=`
    <div class="ywm">${yr}</div>
    ${srow([{v:yb.length,l:'книг в этом году'},{v:avg(yb.map(b=>b.rating)),l:'средняя оценка',g:true}])}
    ${sh('по месяцам')}${bars}
    ${sh('топ года')}${top3.map((b,i)=>bcard(b,i+1)).join('')}
  `;
}

// ══════════════════════════════════════════════════════
// RENDER — EXPERIENCE
// ══════════════════════════════════════════════════════
function renderExp(){
  const p=document.getElementById('p2');
  if(!books.length){p.innerHTML=empty('Начни добавлять книги!','Нажми + чтобы добавить первую');return;}

  const stabs=`<div class="stabs">
    <button class="stab${curExp===0?' on':''}" onclick="selExp(0)">статистика</button>
    <button class="stab${curExp===1?' on':''}" onclick="selExp(1)">любимые авторы</button>
    <button class="stab${curExp===2?' on':''}" onclick="selExp(2)">топ 10/10</button>
  </div>`;

  let body='';

  if(curExp===0){
    const total=books.length,a=avg(books.map(b=>b.rating)),tens=books.filter(b=>b.rating===10).length;
    const dist={};
    books.forEach(b=>{const k=b.rating.toFixed(1);dist[k]=(dist[k]||0)+1;});
    const sorted=Object.entries(dist).sort((a,b)=>parseFloat(b[0])-parseFloat(a[0]));
    const maxB=Math.max(...sorted.map(([,c])=>c));
    const rows=sorted.map(([r,c])=>{
      const v=parseFloat(r);
      const col=v>=9.5?'var(--gold)':v>=8?'var(--ac)':v>=6.5?`rgba(var(--acr),.6)`:`rgba(var(--acr),.35)`;
      return `<div class="drow"><span class="drv">${r}</span><div class="drb"><div class="drf" style="width:${(c/maxB*100).toFixed(1)}%;background:${col};opacity:.85"></div></div><span class="drc">${c}</span></div>`;
    }).join('');
    body=`${srow([{v:total,l:'всего прочитано'},{v:a,l:'средняя оценка',g:true},{v:tens,l:'оценок 10/10',g:true}])}${sh('распределение оценок')}${rows}`;
  }
  if(curExp===1){
    const am={};
    books.forEach(b=>{if(!am[b.author])am[b.author]={r:[],n:0};am[b.author].r.push(b.rating);am[b.author].n++;});
    const top=Object.entries(am)
      .map(([name,d])=>({name,n:d.n,avg:parseFloat((d.r.reduce((s,v)=>s+v,0)/d.r.length).toFixed(2))}))
      .sort((a,b)=>b.avg-a.avg||b.n-a.n);
    const one=top.filter(a=>a.n===1), multi=top.filter(a=>a.n>=2);
    const renderRow=a=>`<div class="ar"><span class="an">${esc(a.name)}</span><div class="am"><span class="ab">${a.n} ${a.n===1?'книга':a.n>=2&&a.n<=4?'книги':'книг'}</span><span class="aa">${a.avg.toFixed(1)}</span></div></div>`;
    body=top.length
      ?`${multi.length?sh('от 2 книг')+''+multi.map(renderRow).join(''):''}${one.length?sh('1 книга')+''+one.map(renderRow).join(''):''}`
      :`${empty('Пока нет книг')}`;
  }
  if(curExp===2){
    const tens=[...books.filter(b=>b.rating===10)].sort((a,b)=>a.title.localeCompare(b.title,'ru'));
    const n=tens.length,pl=n===1?'книга':n>=2&&n<=4?'книги':'книг';
    body=tens.length
      ?`${sh('оценка 10/10')}<div class="tcnt">${n} ${pl}</div>${tens.map(b=>bcard(b)).join('')}`
      :`${empty('Пока нет книг на 10/10')}`;
  }
  p.innerHTML=stabs+body;
}
function selExp(i){curExp=i;renderExp();}

// ══════════════════════════════════════════════════════
// RENDER — BOOKS LIST
// ══════════════════════════════════════════════════════
function renderBooks(){
  const p=document.getElementById('p3');
  const sortBtns=`<div class="sort-row">
    <button class="srt${curSort===0?' on':''}" onclick="selSort(0)">по дате ↓</button>
    <button class="srt${curSort===1?' on':''}" onclick="selSort(1)">оценка ↓</button>
    <button class="srt${curSort===2?' on':''}" onclick="selSort(2)">А — Я</button>
  </div>`;

  const toolbar=`<div class="toolbar">
    <button class="tbr-btn" onclick="exportData()">⬆ экспорт JSON</button>
    <button class="tbr-btn" onclick="document.getElementById('imp').click()">⬇ импорт JSON</button>
    <button class="tbr-btn" onclick="document.getElementById('impxl').click()">📊 импорт .xlsx</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
    <input type="file" id="impxl" accept=".xlsx,.xls" style="display:none" onchange="importXlsx(event)">
  </div>`;

  let filtered=books.filter(b=>{
    if(!searchQ)return true;
    const q=searchQ.toLowerCase();
    return b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q);
  });
  if(curSort===0)filtered.sort((a,b)=>{if(!a.month&&!b.month)return 0;if(!a.month)return 1;if(!b.month)return -1;return b.month.localeCompare(a.month);});
  else if(curSort===1)filtered.sort((a,b)=>b.rating-a.rating);
  else filtered.sort((a,b)=>a.title.localeCompare(b.title,'ru'));

  const list=filtered.length
    ?filtered.map(b=>bcard(b)).join('')
    :empty('Ничего не найдено');

  p.innerHTML=`
    <div class="srch-wrap"><span class="srch-ico">🔍</span><input class="srch" id="srch-inp" type="search" placeholder="Поиск по названию или автору..." value="${esc(searchQ)}" oninput="onSearch(this.value)"></div>
    ${sortBtns}
    ${sh(filtered.length+' книг')}
    ${list}
    <div class="hdiv" style="margin-top:16px"></div>
    ${toolbar}
  `;
}
function selSort(i){curSort=i;renderBooks();}
function onSearch(v){searchQ=v;renderBooks();}

// ══════════════════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════════════════
function renderAll(){renderMonthly();renderYearly();renderExp();renderBooks();}

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
let pickerYear=new Date().getFullYear();

function buildMonthPicker(selected){
  draftMonth=selected||'';
  // Set year
  if(selected){
    pickerYear=parseInt(selected.split('-')[0]);
  } else {
    pickerYear=new Date().getFullYear();
  }
  renderPicker();
}

function renderPicker(){
  const MO_SHORT=["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
  document.getElementById('picker-yr-lbl').textContent=pickerYear;
  const grid=document.getElementById('picker-grid');
  grid.innerHTML=MO_SHORT.map((mo,i)=>{
    const val=`${pickerYear}-${String(i+1).padStart(2,'0')}`;
    return `<button type="button" class="mpicker-mo${draftMonth===val?' on':''}" onclick="pickerSelMo('${val}')">${mo}</button>`;
  }).join('');
  document.getElementById('picker-none').classList.toggle('on',!draftMonth);
}

function pickerYr(delta){
  pickerYear+=delta;
  renderPicker();
}
function pickerSelMo(val){
  draftMonth=val;
  renderPicker();
}
function pickerNone(){
  draftMonth='';
  renderPicker();
}

function buildRatingGrid(selected){
  document.getElementById('rgrid').innerHTML=RATINGS.map(r=>
    `<button type="button" class="ropt${r===selected?' on':''}" onclick="selRating(${r})">${r}</button>`
  ).join('');
  draftRating=selected;
}

function selRating(r){
  draftRating=r;
  document.querySelectorAll('.ropt').forEach(b=>b.classList.toggle('on',parseFloat(b.textContent)===r));
}

function openAdd(){
  editId=null;
  document.getElementById('mo-title').textContent='Новая книга';
  document.getElementById('f-title').value='';
  document.getElementById('f-author').value='';
  buildRatingGrid(8);
  const latestMonth=books.filter(b=>b.month).map(b=>b.month).sort().pop()||'';
  draftMonth=latestMonth;
  buildMonthPicker(latestMonth);
  document.getElementById('btn-row').innerHTML=`
    <button class="btn-cancel" onclick="closeModal()">Отмена</button>
    <button class="btn-save" onclick="saveBook()">Добавить</button>`;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),200);
}

function openEdit(id){
  const b=books.find(x=>x.id===id);
  if(!b)return;
  editId=id;
  document.getElementById('mo-title').textContent='Редактировать';
  document.getElementById('f-title').value=b.title;
  document.getElementById('f-author').value=b.author;
  buildRatingGrid(b.rating);
  draftMonth=b.month||'';
  buildMonthPicker(b.month||'');
  document.getElementById('btn-row').innerHTML=`
    <button class="btn-del" onclick="deleteBook('${id}')">Удалить</button>
    <button class="btn-save" onclick="saveBook()">Сохранить</button>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function saveBook(){
  const title=document.getElementById('f-title').value.trim();
  const author=document.getElementById('f-author').value.trim();
  const month=draftMonth||null;
  if(!title){document.getElementById('f-title').focus();document.getElementById('f-title').style.borderColor='#e07070';setTimeout(()=>document.getElementById('f-title').style.borderColor='',1500);return;}
  if(editId){
    const i=books.findIndex(b=>b.id===editId);
    if(i>=0)books[i]={...books[i],title,author:author||'неизвестный автор',rating:draftRating,month};
  }else{
    books.push({id:uid(),title,author:author||'неизвестный автор',rating:draftRating,month});
  }
  persist();closeModal();renderAll();
}

function deleteBook(id){
  if(!confirm('Удалить книгу?'))return;
  books=books.filter(b=>b.id!==id);
  persist();closeModal();renderAll();
}

// ══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ══════════════════════════════════════════════════════
function exportData(){
  const data=JSON.stringify(books,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`reading-diary-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)){
        if(confirm(`Импортировать ${data.length} книг? Это добавит их к существующим.`)){
          const existing=new Set(books.map(b=>b.id));
          data.forEach(b=>{if(!existing.has(b.id))books.push(b);});
          persist();renderAll();
        }
      }
    }catch(err){alert('Не удалось прочитать файл');}
  };
  r.readAsText(f);
  e.target.value='';
}

function importXlsx(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:null});
      const parsed=[];
      rows.forEach(row=>{
        const k=Object.keys(row);
        const tk=k.find(x=>/назв|title/i.test(x))||k[0];
        const ak=k.find(x=>/автор|author/i.test(x))||k[1];
        const sk=k.find(x=>/оцен|score|rating/i.test(x))||k[3];
        const dk=k.find(x=>/дата|date|unnamed.*4/i.test(x))||k[4];
        const title=String(row[tk]||'').trim();
        const author=String(row[ak]||'').trim()||'неизвестный автор';
        const rating=parseFloat(row[sk]);
        if(!title||isNaN(rating))return;
        // ✅ SheetJS cellDates:true returns LOCAL time Date objects
        // Using getMonth()/getFullYear() (local), NOT getUTC* — fixes the 1-month shift
        let month=null;
        const dv=row[dk];
        if(dv){
          let y,m;
          if(dv instanceof Date){
            // SheetJS created a local-time Date — use local accessors
            y=dv.getFullYear(); m=dv.getMonth()+1;
          } else if(typeof dv==='number'&&dv>0){
            // Raw Excel serial → add 12h buffer to survive any TZ offset
            const d=new Date(Math.round((dv-25569)*86400000)+43200000);
            y=d.getUTCFullYear(); m=d.getUTCMonth()+1;
          } else if(typeof dv==='string'&&dv.match(/^\d{4}-\d{2}/)){
            const parts=dv.split('-');
            y=parseInt(parts[0]); m=parseInt(parts[1]);
          }
          if(y&&m&&y>2000&&y<2100) month=`${y}-${String(m).padStart(2,'0')}`;
        }
        parsed.push({id:uid(),title,author,rating,month});
      });
      if(!parsed.length){alert('Не удалось распознать книги. Убедись что в таблице есть колонки: название, автор, оценка.');return;}
      // Deduplicate by title+author
      const existing=new Set(books.map(b=>(b.title+b.author).toLowerCase()));
      const fresh=parsed.filter(b=>!existing.has((b.title+b.author).toLowerCase()));
      const msg=fresh.length===parsed.length
        ?`Добавить ${parsed.length} книг из таблицы?`
        :`Найдено ${parsed.length} книг, из них ${fresh.length} новых (${parsed.length-fresh.length} уже есть). Добавить новые?`;
      if(confirm(msg)){
        books.push(...fresh);
        persist();renderAll();
        alert(`Добавлено ${fresh.length} книг ✓`);
      }
    }catch(err){console.error(err);alert('Ошибка при чтении .xlsx файла');}
  };
  r.readAsArrayBuffer(f);
  e.target.value='';
}

// ══════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════
function switchTab(i){
  curTab=i;
  document.querySelectorAll('.mtab').forEach((b,j)=>b.classList.toggle('on',i===j));
  document.querySelectorAll('.pane').forEach((pp,j)=>pp.classList.toggle('on',i===j));
  // Focus search when opening books tab
  if(i===3) setTimeout(()=>{const s=document.getElementById('srch-inp');if(s&&searchQ)s.focus();},100);
}

// ══════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════
function cycleTheme(){
  curTheme=(curTheme+1)%3;
  applyTheme();
  persist();
}
function applyTheme(){
  const app=document.getElementById('app');
  THEMES.forEach(t=>app.classList.remove(t.c));
  app.classList.add(THEMES[curTheme].c);
  document.getElementById('tname').textContent=THEMES[curTheme].n;
  document.querySelector('.theme-btn').innerHTML=THEMES[curTheme].i+' <span id="tname">'+THEMES[curTheme].n+'</span>';
  document.querySelector('meta[name="theme-color"]').content=
    curTheme===0?'#070d08':curTheme===1?'#050e18':'#06040e';
  // Stars
  if(curTheme===2&&!document.querySelector('.star')){
    const frag=document.createDocumentFragment();
    for(let i=0;i<80;i++){
      const s=document.createElement('div');
      s.className='star';
      const size=Math.random()<0.15?2.5:Math.random()<0.4?1.5:1;
      s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--oa:${0.2+Math.random()*0.5};--ob:${0.7+Math.random()*0.3};--tw:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
      frag.appendChild(s);
    }
    document.getElementById('stars-bg').appendChild(frag);
  }
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
hydrate();
applyTheme();
renderAll();
</script>
